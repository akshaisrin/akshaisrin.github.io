<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 - Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0c0d14;
        --fg: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.6);
        --v1: #c4b5fd;
        --v2: #7c3aed;
      }

      body {
        margin: 0;
        background: radial-gradient(900px 500px at 20% -10%, rgba(124, 58, 237, 0.35), transparent 60%),
          radial-gradient(700px 350px at 90% 10%, rgba(196, 181, 253, 0.18), transparent 55%),
          var(--bg);
        color: var(--fg);
        font-family: 'Space Grotesk', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }

      .card {
        width: min(860px, 100%);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.25);
        box-shadow: 0 0 0 1px rgba(124, 58, 237, 0.12), 0 30px 90px rgba(0, 0, 0, 0.5);
        padding: 28px;
      }

      .code404 {
        margin: 0 0 12px;
        font-family: 'Space Grotesk', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-weight: 800;
        font-size: clamp(56px, 7vw, 82px);
        line-height: 0.95;
        background: linear-gradient(135deg, rgba(196, 181, 253, 1), rgba(124, 58, 237, 1));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 20px 45px rgba(124, 58, 237, 0.12));
      }

      .pageNotFound {
        margin: 0;
        font-size: clamp(28px, 4.2vw, 44px);
        line-height: 1.05;
        color: rgba(255, 255, 255, 0.96);
        font-weight: 700;
      }

      .copy {
        margin-top: 14px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .diamondDivider {
        margin-top: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .diamondLine {
        height: 1px;
        width: 72px;
        border-radius: 999px;
      }

      .diamondLine.left {
        background: linear-gradient(
          90deg,
          rgba(124, 58, 237, 0) 0%,
          rgba(196, 181, 253, 0.45) 35%,
          rgba(196, 181, 253, 0.8) 100%
        );
      }

      .diamondLine.right {
        background: linear-gradient(
          270deg,
          rgba(124, 58, 237, 0) 0%,
          rgba(196, 181, 253, 0.45) 35%,
          rgba(196, 181, 253, 0.8) 100%
        );
      }

      .diamondSquare {
        width: 12px;
        height: 12px;
        transform: rotate(45deg);
        border-radius: 2px;
        background: linear-gradient(135deg, rgba(196, 181, 253, 0.95), rgba(124, 58, 237, 0.9));
        box-shadow: 0 0 22px rgba(167, 139, 250, 0.45);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 14px;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.9);
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        border-color: rgba(196, 181, 253, 0.45);
        background: rgba(124, 58, 237, 0.16);
      }

      .btn.primary {
        border-color: rgba(196, 181, 253, 0.45);
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.28), rgba(196, 181, 253, 0.08));
      }

      .actions {
        margin-top: 22px;
      }
    </style>

    <script>
      (function () {
        var path = (window.location.pathname || '').replace(/\/+$/, '');

        var section = '';
        if (path.endsWith('/projects')) section = 'projects';
        else if (path.endsWith('/experience')) section = 'experience';
        else if (path.endsWith('/skills')) section = 'skills';

        if (section) {
          // Relative redirect so it works with project subpaths too.
          window.location.replace('./#' + section);
          return;
        }

        // Redirect unknown paths into the SPA so the 404 UI is rendered in React.
        try {
          sessionStorage.setItem('requestedPath', path || '/');
        } catch (e) {
          // Ignore storage errors (private mode, etc).
        }
        window.location.replace('./#/404');
      })();
    </script>
  </head>
  <body style="display:none">
    <div class="wrap">
      <div class="card">
        <div class="code404">404</div>
        <h2 class="pageNotFound">Page Not Found</h2>

        <!-- Divider — diamond like the rest of the site -->
        <div class="diamondDivider" aria-hidden>
          <div class="diamondLine left" />
          <div class="diamondSquare" />
          <div class="diamondLine right" />
        </div>

        <p class="copy">Sorry, the page you&apos;re looking for doesn&apos;t exist or has been moved..</p>

        <div class="actions">
          <a class="btn primary" href="./">Back to Home</a>
        </div>
      </div>
    </div>
  </body>
</html>
